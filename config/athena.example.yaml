# Athena Configuration Example
# Copy to athena.yaml and modify as needed

server:
  host: "0.0.0.0"
  port: 8080

llm:
  base_url: "https://api.openai.com/v1"
  api_key: "sk-your-api-key-here"
  model: "gpt-4o"

company:
  max_agents: 100
  max_memory_mb: 16384

blackboard:
  data_dir: "./data/board"

meeting:
  data_dir: "./data/meetings"

agents:
  data_dir: "./data/agents"

logging:
  level: "info"
  file: "./data/logs/athena.log"
